{% extends "base.html" %}

{% block content %}
<div class="main-container">
    <div class="glass-card">
        <h1>Music Note Detector</h1>

        <!-- Navigation Tabs -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('upload')">File Upload</button>
            <button class="tab-btn" onclick="switchTab('realtime')">Real-time Detection</button>
        </div>

        <!-- Tab 1: File Upload -->
        <div id="upload" class="tab-content active">
            <div class="upload-area" id="dropZone">
                <p>Drag & drop audio file here or click to select</p>
                <input type="file" id="audioFile" accept="audio/*" style="display: none">
                <button class="btn btn-primary" onclick="document.getElementById('audioFile').click()">Select
                    File</button>
            </div>

            <div id="fileInfo" style="margin-bottom: 1rem; text-align: center;"></div>

            <button id="analyzeBtn" class="btn btn-primary" style="width: 100%; display: none;">Analyze Audio</button>

            <!-- Results Section -->
            <div id="results" style="display: none; margin-top: 2rem;">
                <div class="glass-card" style="background: rgba(0,0,0,0.2);">
                    <h3>Analysis Results</h3>
                    <div id="summary" style="margin: 1rem 0;"></div>

                    <!-- Search/Filter Controls -->
                    <div class="search-controls" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <input type="text" id="searchTime" placeholder="Search (e.g., '1:30' or 'C#4')...">
                        <select id="pageSize" class="btn" style="width: auto;">
                            <option value="10">10 / page</option>
                            <option value="20" selected>20 / page</option>
                            <option value="50">50 / page</option>
                        </select>
                    </div>

                    <!-- Export Buttons -->
                    <div class="export-controls" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <button class="btn" onclick="exportResults('csv')">Export CSV</button>
                        <button class="btn" onclick="exportResults('json')">Export JSON</button>
                        <button class="btn" onclick="exportResults('txt')">Export TXT</button>
                    </div>

                    <!-- Results Table -->
                    <div style="overflow-x: auto;">
                        <table id="resultsTable"
                            style="width: 100%; border-collapse: collapse; color: var(--text-primary);">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--glass-border);">
                                    <th style="padding: 1rem; text-align: left;">Time</th>
                                    <th style="padding: 1rem; text-align: left;">Note</th>
                                    <th style="padding: 1rem; text-align: left;">Frequency</th>
                                    <th style="padding: 1rem; text-align: left;">Confidence</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody"></tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination"
                        style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; align-items: center;">
                        <button id="prevPage" class="btn">Previous</button>
                        <span id="pageInfo">Page <span id="currPage">1</span> of <span id="totalPages">1</span></span>
                        <button id="nextPage" class="btn">Next</button>
                    </div>
                </div>

                <!-- Visualization -->
                <div id="visualization" style="margin-top: 2rem; min-height: 400px;"></div>
            </div>
        </div>

        <!-- Tab 2: Real-time Detection -->
        <div id="realtime" class="tab-content">
            <div style="text-align: center;">
                <div class="control-panel" style="margin-bottom: 2rem;">
                    <button id="startDetection" class="btn btn-primary">Start Microphone</button>
                    <button id="stopDetection" class="btn btn-danger" disabled>Stop</button>
                </div>

                <div class="glass-card"
                    style="background: rgba(0,0,0,0.2); display: inline-block; min-width: 300px; padding: 2rem;">
                    <div class="note-display" id="noteDisplay">—</div>
                    <div class="freq-display" id="freqDisplay">Ready to detect</div>

                    <!-- Musical Staff SVG -->
                    <div class="staff-container" style="display: flex; justify-content: center; margin: 1rem 0;">
                        <svg id="staffSvg" width="300" height="150"
                            style="border: 1px solid var(--glass-border); border-radius: 8px;"></svg>
                    </div>

                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Tab Switching Logic
    function switchTab(tabId) {
        // Update Buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        // Update Content
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
    }
</script>
{% endblock %}
