{% extends "base.html" %}

{% block content %}
<div class="app-container">
    <header class="header">
        <div class="header-content">
            <h1 class="brand-gradient">Music Note Detector</h1>
        </div>
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme" aria-label="Toggle Theme">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <!-- Main Detector Panel (Centered) -->
    <main class="card detector-card" style="max-width: 800px; margin: 0 auto;">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('realtime')">Microphone</button>
            <button class="tab-btn" onclick="switchTab('upload')">File Upload</button>
        </div>

        <!-- Content: Real-time -->
        <div id="realtime" class="tab-content" style="display: block; width: 100%;">
            <div class="status-label" id="freqDisplay">Ready to listen</div>

            <div class="note-display" id="noteDisplay">—</div>

            <!-- Staff Removed as per user request -->
            <!-- <div class="staff-container">
                    <svg id="staffSvg" width="300" height="150"></svg>
                </div> -->

            <button id="startDetection" class="btn btn-pill">Start Detection</button>
            <button id="stopDetection" class="btn btn-ghost" disabled
                style="margin-top: 1rem; display: block; margin-left: auto; margin-right: auto;">Reset</button>

            <div class="confidence-bar-container">
                <div class="confidence-fill" id="confidenceBar"></div>
            </div>
        </div>

        <!-- Content: Upload -->
        <div id="upload" class="tab-content" style="display: none; width: 100%;">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('audioFile').click()">
                <div class="upload-icon">↓</div>
                <p>Click or Drop Audio File</p>
                <div style="margin-top: 1rem;">
                    <p
                        style="font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem;">
                        📁 Supported Formats</p>
                    <div style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">WAV</span>
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">MP3</span>
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">FLAC</span>
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">M4A</span>
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">OGG</span>
                        <span
                            style="background: var(--bg-subtle); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color-subtle);">WMA</span>
                    </div>
                </div>
                <input type="file" id="audioFile" accept="audio/*,video/mp4,video/x-m4v" style="display: none">
            </div>
            <div id="fileInfo" style="margin-top: 1rem;"></div>
            <button id="analyzeBtn" class="btn btn-pill" style="margin-top: 1rem; display: none;">Analyze
                File</button>

            <!-- Visualization Containers -->
            <div id="visualizations" style="display: none; margin-top: 2rem;">
                <div id="waveform" style="width: 100%; height: 250px; margin-bottom: 2rem;"></div>
            </div>

            <div id="results"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-name">Nguyen Minh Quan</p>
            <div class="footer-links">
                <a href="https://www.facebook.com/koderqq/" target="_blank" class="footer-link">Facebook</a>
                <span class="footer-divider">•</span>
                <a href="https://www.linkedin.com/in/quanng47/" target="_blank" class="footer-link">LinkedIn</a>
            </div>
        </div>
    </footer>
</div>

<script>
    // Minimal Tab Logic
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
{% endblock %}
