{% extends "base.html" %}

{% block content %}
<div class="app-container">
    <header class="header">
        <h1>Fokus Note</h1>
        <p>Advanced Real-time Detector</p>
    </header>

    <div class="main-grid">
        <!-- LEFT: Detector Panel -->
        <main class="card detector-card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('realtime')">Microphone</button>
                <button class="tab-btn" onclick="switchTab('upload')">File Upload</button>
            </div>

            <!-- Content: Real-time -->
            <div id="realtime" class="tab-content" style="display: block; width: 100%;">
                <div class="status-label" id="freqDisplay">Ready to listen</div>

                <div class="note-display" id="noteDisplay">—</div>

                <div class="staff-container">
                    <svg id="staffSvg" width="300" height="150"></svg>
                </div>

                <button id="startDetection" class="btn btn-pill">Start Detection</button>
                <button id="stopDetection" class="btn btn-ghost" disabled
                    style="margin-top: 1rem; display: block; margin-left: auto; margin-right: auto;">Reset</button>

                <div class="confidence-bar-container">
                    <div class="confidence-fill" id="confidenceBar"></div>
                </div>
            </div>

            <!-- Content: Upload -->
            <div id="upload" class="tab-content" style="display: none; width: 100%;">
                <div class="upload-area" id="dropZone"
                    style="border: 2px dashed #eee; padding: 4rem 2rem; border-radius: 16px; cursor: pointer; transition: 0.2s;"
                    onclick="document.getElementById('audioFile').click()" onmouseover="this.style.borderColor='#111'"
                    onmouseout="this.style.borderColor='#eee'">
                    <p style="color: #888; font-weight: 500;">Click or Drag Audio File</p>
                    <input type="file" id="audioFile" accept="audio/*" style="display: none">
                </div>
                <div id="fileInfo" style="margin-top: 1rem;"></div>
                <button id="analyzeBtn" class="btn btn-pill" style="margin-top: 1rem; display: none;">Analyze
                    File</button>
                <div id="results"></div>
            </div>
        </main>

        <!-- RIGHT: History Panel -->
        <aside class="card history-card">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Detected Notes</h2>

            <div class="input-group" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <input type="text" placeholder="Add note..." disabled
                    style="flex: 1; padding: 0.8rem; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9;">
                <button class="btn btn-pill" style="padding: 0 1.5rem; font-size: 0.9rem;">ADD</button>
            </div>

            <div class="empty-state" style="text-align: center; color: #ccc; margin-top: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">♩</div>
                <p>History is empty</p>
            </div>

            <ul id="historyList" class="history-list">
                <!-- Javascript will insert items here -->
            </ul>
        </aside>
    </div>
</div>

<script>
    // Minimal Tab Logic
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
{% endblock %}
