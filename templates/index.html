{% extends "base.html" %}

{% block content %}
<!-- Header -->
<header class="app-header">
    <div class="app-brand">
        <h1>Music Note Detector</h1>
        <p>Stay tuned, get pitch perfect</p>
    </div>

    <div class="theme-toggle-container">
        <!-- SVG Icons for theme toggle could go here, keeping simple for now -->
        <button class="icon-btn" title="About">i</button>
        <button class="icon-btn" title="Dark Mode (Coming Soon)">☾</button>
    </div>
</header>

<div class="dashboard-grid">
    <!-- LEFT PANEL: Main Detector -->
    <div class="clean-card">
        <!-- Tab Switching (Voice vs File) -->
        <div class="tab-controls">
            <button class="tab-pill active" onclick="switchTab('realtime')">Real-time</button>
            <button class="tab-pill" onclick="switchTab('upload')">File Upload</button>
        </div>

        <!-- Real-time View -->
        <div id="realtime" class="tab-content active" style="width: 100%;">
            <div class="freq-display" id="freqDisplay">READY TO DETECT</div>

            <div class="note-display" id="noteDisplay">—</div>

            <!-- Musical Staff -->
            <div class="staff-container" style="display: flex; justify-content: center; margin-bottom: 3rem;">
                <svg id="staffSvg" width="300" height="150"></svg>
            </div>

            <div class="controls">
                <button id="startDetection" class="btn btn-primary">START</button>
                <button id="stopDetection" class="btn btn-secondary" disabled>RESET</button>
            </div>

            <div class="confidence-bar"
                style="margin-top: 2rem; width: 50%; margin-left: auto; margin-right: auto; background: #eee;">
                <div class="confidence-fill" id="confidenceBar" style="width: 0%"></div>
            </div>
        </div>

        <!-- File Upload View -->
        <div id="upload" class="tab-content" style="width: 100%;">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('audioFile').click()">
                <p>Click to upload audio file</p>
                <input type="file" id="audioFile" accept="audio/*" style="display: none">
            </div>
            <div id="fileInfo"></div>
            <button id="analyzeBtn" class="btn btn-primary" style="display: none; width: 100%;">ANALYZE</button>
            <div id="results" style="margin-top: 2rem;"></div>
        </div>
    </div>

    <!-- RIGHT PANEL: History / Tasks -->
    <div class="history-card">
        <h2 class="card-title">Detection History</h2>

        <div class="input-group">
            <input type="text" placeholder="Add a note manually..." disabled
                style="background: #f5f5f5; cursor: not-allowed;">
            <button class="btn btn-primary" style="padding: 0.5rem 1.5rem;">ADD</button>
        </div>

        <div id="historyListContainer">
            <div class="empty-state">
                <div class="empty-icon">📝</div>
                <p>No notes detected yet.</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">Start the detector to populate history.</p>
            </div>
            <ul class="history-list" id="historyList">
                <!-- History items will be injected here -->
            </ul>
        </div>

        <div
            style="margin-top: auto; padding-top: 2rem; text-align: center; color: var(--text-tertiary); font-size: 0.8rem;">
            History is saved for this session
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        // Buttons
        document.querySelectorAll('.tab-pill').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Content
        document.querySelectorAll('.tab-content').forEach(c => {
            c.classList.remove('active');
            c.style.display = 'none';
        });
        const activeContent = document.getElementById(tabId);
        activeContent.classList.add('active');
        activeContent.style.display = 'block';
    }
</script>
{% endblock %}
